spring.application.name=all-in-one

spring.datasource.url=jdbc:mysql://localhost:3306/all_in_one?useSSL=false&serverTimezone=UTC
spring.datasource.username=muhammad
spring.datasource.password=sara
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


jwt.secret=ThisIsAVeryLongSecretKeyForJWTTokenGenerationThatNeedsToBeAtLeast512BitsWhichIsAbout64CharactersLongForHS512Algorithm
jwt.expiration=86400000

server.port=8080

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG

# Exclude certain paths from restart trigger
spring.devtools.restart.exclude=static/**,public/**

# Enable/disable features
spring.devtools.livereload.enabled=true

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.messages.use-code-as-default-message=true

# Locale settings
spring.web.locale=en
spring.web.locale-resolver=accept-header