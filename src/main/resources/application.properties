spring.application.name=all-in-one

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/all_in_one?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=muhammad
spring.datasource.password=sara
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=ThisIsAVeryLongSecretKeyForJWTTokenGenerationThatNeedsToBeAtLeast512BitsWhichIsAbout64CharactersLongForHS512Algorithm
jwt.expiration=86400000

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Spring Data REST (moved off root so / serves index.html) ──────────────────
spring.data.rest.base-path=/data-api

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG
logging.level.com.shohan.allinone=DEBUG

# ── DevTools ──────────────────────────────────────────────────────────────────
spring.devtools.restart.exclude=static/**,public/**
spring.devtools.livereload.enabled=true

# ── i18n ──────────────────────────────────────────────────────────────────────
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.messages.use-code-as-default-message=true

# ── Locale ────────────────────────────────────────────────────────────────────
spring.web.locale=en
spring.web.locale-resolver=accept-header