<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All-In-One Backend</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 640px;
            margin: 60px auto; padding: 0 20px; color: #222; }
        h1 { color: #2a5db0; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
        .btn { display: inline-block; padding: 8px 14px; background: #e74c3c;
            color: #fff; text-decoration: none; border-radius: 4px;
            border: none; cursor: pointer; font-size: 1em; }
    </style>
</head>
<body>
<h1>All-In-One Backend</h1>
<p>The backend is up and running.</p>
<p>Available API endpoints:</p>
<ul>
    <li><code>POST /api/auth/login</code></li>
    <li><code>POST /api/auth/register</code></li>
    <li><code>GET  /api/projects</code></li>
    <li><code>GET  /api/blogs</code></li>
    <li><code>POST /api/messages</code></li>
    <li><code>GET  /api/users</code> (admin)</li>
    <li><code>GET  /api/service-requests</code> (admin)</li>
</ul>
<form action="/logout" method="post">
    <button class="btn" type="submit">Logout</button>
</form>
</body>
</html>
